<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nickje2000 | Socials</title>
    
    <meta property="og:title" content="nickje2000" />
    <meta property="og:description" content="Official landing page for Nickje2000" />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#ff66cc">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tsparticles/2.12.0/tsparticles.bundle.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --glow-pink: #ff66cc; 
            --status-online: #23a55a;
            --status-idle: #f0b232;
            --status-dnd: #f23f43;
            --status-offline: #80848e;
        }

        body {
            color: white;
            background: black;
            margin: 0;
            font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
        }

        .text-glow-pink {
            color: var(--glow-pink);
            text-shadow: 0 0 8px rgba(255, 102, 204, 0.6);
        }

        .glass-container {
            z-index: 10;
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* Improved Social Buttons */
        .btn-social {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 12px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 90px;
        }

        .btn-social:hover {
            background: rgba(255, 102, 204, 0.12);
            border-color: var(--glow-pink);
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 10px 25px rgba(255, 102, 204, 0.15);
        }

        .btn-social:hover svg, .btn-social:hover i {
            color: var(--glow-pink);
            filter: drop-shadow(0 0 5px var(--glow-pink));
        }

        /* Themed Projects Button */
        .btn-projects {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        .btn-projects:hover {
            background: var(--glow-pink);
            color: black;
            border-color: var(--glow-pink);
            box-shadow: 0 0 20px rgba(255, 102, 204, 0.4);
            transform: translateY(-2px);
        }

        #tsparticles {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        #status-indicator {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 4px solid #1a1a1a;
            background-color: var(--status-offline);
        }

        .status-pulse {
            animation: status-glow 2s infinite;
        }

        @keyframes status-glow {
            0% { box-shadow: 0 0 0 0 rgba(35, 165, 90, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(35, 165, 90, 0); }
            100% { box-shadow: 0 0 0 0 rgba(35, 165, 90, 0); }
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(10px);
            display: none;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.active { display: flex; opacity: 1; }

        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: var(--glow-pink); }
    </style>
</head>
<body class="flex min-h-screen items-center justify-center p-4">

    <div id="tsparticles"></div>

    <main class="glass-container relative w-full max-w-xl rounded-[2.5rem] p-8 sm:p-12 flex flex-col items-center">
        <div class="relative group mb-6">
            <div class="absolute -inset-1 bg-gradient-to-r from-pink-500 to-purple-600 rounded-full blur opacity-25 group-hover:opacity-75 transition duration-1000"></div>
            <div class="relative">
                <img id="profile-img" src="" class="w-28 h-28 sm:w-36 sm:h-36 rounded-full border-2 border-white/10 object-cover opacity-0 transition-opacity" onerror="this.src='https://ui-avatars.com/api/?name=N&background=ff66cc&color=fff'; this.classList.remove('opacity-0');">
                <div id="status-indicator"></div>
            </div>
        </div>

        <h1 class="text-3xl sm:text-4xl font-bold tracking-tight mb-2 text-glow-pink">Nickje2000</h1>
        
        <div id="discord-activity-container" class="mb-8 bg-white/5 border border-white/10 rounded-2xl px-5 py-3 flex items-center gap-4 w-full max-w-sm overflow-hidden">
            <div id="activity-image-container" class="w-12 h-12 flex-shrink-0 hidden relative">
                <img id="activity-image" src="" class="rounded-lg object-cover w-full h-full">
                <div id="activity-image-placeholder" class="absolute inset-0 bg-white/10 rounded-lg flex items-center justify-center">
                    <i data-lucide="music" class="w-5 h-5 text-white/50"></i>
                </div>
            </div>
            <div class="flex flex-col min-w-0">
                <span id="discord-activity" class="text-sm font-semibold truncate text-white/90">Connecting...</span>
            </div>
        </div>

        <p class="text-center text-white/60 mb-10 leading-relaxed text-sm sm:text-base px-2">
            Hello! I'm Nick, an enthusiastic coder. <br class="hidden sm:block">
            I specialize in <span class="text-white font-medium">Lua</span>, <span class="text-white font-medium">Python</span>, and <span class="text-white font-medium">C++</span>.
        </p>

        <div class="grid grid-cols-2 xs:grid-cols-3 sm:grid-cols-5 gap-3 w-full mb-8">
            <a href="https://github.com/nickje2000" target="_blank" class="btn-social">
                <svg viewBox="0 0 24 24" class="w-7 h-7 fill-current" xmlns="http://www.w3.org/2000/svg"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
                <span class="text-[10px] uppercase font-bold tracking-tighter">GitHub</span>
            </a>

            <a href="https://discord.com/users/1403324959547461692" target="_blank" class="btn-social">
                <i data-lucide="message-circle" class="w-7 h-7"></i>
                <span class="text-[10px] uppercase font-bold tracking-tighter">Discord</span>
            </a>

            <a href="https://steamcommunity.com/id/nickje2000" target="_blank" class="btn-social">
                <i data-lucide="gamepad-2" class="w-7 h-7"></i>
                <span class="text-[10px] uppercase font-bold tracking-tighter">Steam</span>
            </a>

            <a href="https://anilist.co/user/Nickje2000/" target="_blank" class="btn-social">
                <i data-lucide="tv" class="w-7 h-7"></i>
                <span class="text-[10px] uppercase font-bold tracking-tighter">AniList</span>
            </a>

            <div onclick="openMusicModal()" class="btn-social cursor-pointer">
                <i data-lucide="music" class="w-7 h-7"></i>
                <span class="text-[10px] uppercase font-bold tracking-tighter">Music</span>
            </div>
        </div>

        <button onclick="openProjectsModal()" class="btn-projects w-full font-bold py-4 rounded-2xl flex items-center justify-center gap-2 mb-8 shadow-xl">
            <i data-lucide="code-2" class="w-5 h-5"></i>
            VIEW MY PROJECTS
        </button>

        <span class="text-[10px] opacity-20 font-bold tracking-[0.3em]">© <span id="year"></span> NICKJE2000</span>
    </main>

    <div id="music-modal" class="modal-overlay items-center justify-center p-4" onclick="closeModals()">
        <div class="bg-[#0f0f0f] border border-white/10 rounded-3xl w-full max-w-md overflow-hidden" onclick="event.stopPropagation()">
            <div class="p-6 border-b border-white/5 flex justify-between items-center bg-white/5">
                <span class="font-bold text-glow-pink uppercase text-xs tracking-widest">Music Connections</span>
                <i data-lucide="x" class="w-5 h-5 cursor-pointer opacity-50 hover:opacity-100" onclick="closeModals()"></i>
            </div>
            <div class="p-6 grid grid-cols-1 gap-4">
                <a href="https://play.qobuz.com/playlist/37989910" target="_blank" class="flex items-center gap-4 p-4 rounded-2xl bg-white/5 hover:bg-blue-500/10 transition-all border border-white/5 hover:border-blue-500/30 group">
                    <div class="w-12 h-12 rounded-xl bg-blue-500/20 flex items-center justify-center text-blue-400 group-hover:scale-110 transition-transform">
                        <i data-lucide="disc" class="w-6 h-6"></i>
                    </div>
                    <div>
                        <div class="font-bold">Qobuz</div>
                        <div class="text-[10px] opacity-50 uppercase font-medium">Audiophile Library</div>
                    </div>
                </a>
                <a href="https://music.youtube.com/@nickje2001" target="_blank" class="flex items-center gap-4 p-4 rounded-2xl bg-white/5 hover:bg-red-500/10 transition-all border border-white/5 hover:border-red-500/30 group">
                    <div class="w-12 h-12 rounded-xl bg-red-500/20 flex items-center justify-center text-red-500 group-hover:scale-110 transition-transform">
                        <i data-lucide="youtube" class="w-6 h-6"></i>
                    </div>
                    <div>
                        <div class="font-bold">YouTube Music</div>
                        <div class="text-[10px] opacity-50 uppercase font-medium">Primary Streaming</div>
                    </div>
                </a>
            </div>
        </div>
    </div>

    <div id="projects-modal" class="modal-overlay items-center justify-center p-4" onclick="closeModals()">
        <div class="bg-[#0f0f0f] border border-white/10 rounded-3xl w-full max-w-lg overflow-hidden" onclick="event.stopPropagation()">
            <div class="p-6 border-b border-white/5 flex justify-between items-center bg-white/5">
                <span class="font-bold text-glow-pink uppercase text-xs tracking-widest">GitHub Repositories</span>
                <i data-lucide="x" class="w-5 h-5 cursor-pointer opacity-50 hover:opacity-100" onclick="closeModals()"></i>
            </div>
            <div id="repo-list" class="p-6 max-h-[60vh] overflow-y-auto custom-scroll flex flex-col gap-3">
                <div class="text-center py-10 opacity-30">Loading repos...</div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        document.getElementById('year').textContent = new Date().getFullYear();

        const DISCORD_ID = "1403324959547461692";
        const GITHUB_USER = "nickje2000";

        // UI Helpers
        function openMusicModal() { const m = document.getElementById('music-modal'); m.style.display = 'flex'; setTimeout(() => m.classList.add('active'), 10); }
        function openProjectsModal() { const m = document.getElementById('projects-modal'); m.style.display = 'flex'; setTimeout(() => m.classList.add('active'), 10); fetchRepos(); }
        function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => { m.classList.remove('active'); setTimeout(() => m.style.display = 'none', 300); }); }

        // Data Fetching
        async function fetchRepos() {
            const list = document.getElementById('repo-list');
            try {
                const res = await fetch(`https://api.github.com/users/${GITHUB_USER}/repos?sort=updated&per_page=10`);
                const data = await res.json();
                list.innerHTML = data.map(repo => `
                    <a href="${repo.html_url}" target="_blank" class="p-4 rounded-xl bg-white/5 hover:bg-white/10 border border-white/5 transition-all flex justify-between items-center group">
                        <div>
                            <div class="font-bold group-hover:text-pink-400 transition-colors">${repo.name}</div>
                            <div class="text-[10px] opacity-40 uppercase tracking-widest">${repo.language || 'Code'}</div>
                        </div>
                        <div class="flex items-center gap-3 text-xs opacity-50">
                            <span>⭐ ${repo.stargazers_count}</span>
                            <i data-lucide="external-link" class="w-3 h-3"></i>
                        </div>
                    </a>
                `).join('');
                lucide.createIcons();
            } catch (err) { list.innerHTML = `<div class="text-center py-10 text-red-500">Error loading repos</div>`; }
        }

        async function fetchDiscordStatus() {
            try {
                const response = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`);
                const { data } = await response.json();
                
                // Avatar
                const profileImg = document.getElementById('profile-img');
                if (data.discord_user.avatar) {
                    profileImg.src = `https://cdn.discordapp.com/avatars/${DISCORD_ID}/${data.discord_user.avatar}.png?size=512`;
                    profileImg.classList.remove('opacity-0');
                    profileImg.classList.add('opacity-100');
                }

                // Status
                const statusEl = document.getElementById('status-indicator');
                const colors = { online: '#23a55a', idle: '#f0b232', dnd: '#f23f43', offline: '#80848e' };
                statusEl.style.backgroundColor = colors[data.discord_status] || colors.offline;
                data.discord_status === 'online' ? statusEl.classList.add('status-pulse') : statusEl.classList.remove('status-pulse');

                // Activity
                const activityEl = document.getElementById('discord-activity');
                const imgCont = document.getElementById('activity-image-container');
                const activityImg = document.getElementById('activity-image');
                const act = data.listening_to_spotify ? { name: "Listening to Spotify", details: data.spotify.song, img: data.spotify.album_art_url } : (data.activities.length ? data.activities[0] : null);

                if (act) {
                    activityEl.innerHTML = `<div class="text-[10px] opacity-50 uppercase font-bold leading-none mb-1">${act.name}</div><div class="truncate font-semibold">${act.details || act.state || 'Active'}</div>`;
                    if (act.img || (act.assets && act.assets.large_image)) {
                        imgCont.classList.remove('hidden');
                        activityImg.src = act.img || `https://cdn.discordapp.com/app-assets/${act.application_id}/${act.assets.large_image}.png`;
                    }
                } else {
                    activityEl.innerHTML = `<span class="opacity-50">Currently</span> <span class="font-bold tracking-tight">${data.discord_status.toUpperCase()}</span>`;
                    imgCont.classList.add('hidden');
                }
            } catch (e) {}
        }

        fetchDiscordStatus();
        setInterval(fetchDiscordStatus, 30000);

        tsParticles.load("tsparticles", {
            fpsLimit: 60,
            particles: {
                color: { value: "#ffffff" },
                links: { color: "#ffffff", distance: 150, enable: true, opacity: 0.05, width: 1 },
                move: { enable: true, speed: 0.4 },
                number: { density: { enable: true, area: 800 }, value: 25 },
                opacity: { value: 0.08 },
                size: { value: { min: 1, max: 2 } },
            }
        });
    </script>
</body>
</html>
